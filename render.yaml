services:
  - type: web
    name: am-fincorp-api
    plan: free
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false # Set this in Render Dashboard to your Neon URL
      - key: JWT_SECRET
        generateValue: true

  - type: static
    name: am-fincorp-web
    plan: free
    buildCommand: pnpm install && pnpm --filter web build
    publishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: am-fincorp-api
          property: host
