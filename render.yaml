services:
  - type: web
    name: am-fincorp-api
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/api/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: am-fincorp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: am-fincorp-db
    plan: free
